{% extends "base.html" %}

{% block title %}Editar Encuesta{% endblock %}

{% block header_title %}
    <h1>Editar Encuesta</h1>
    <a href="{% url 'encuestas:inicio' %}" class="btn-inicio">← Cancelar y volver</a>
{% endblock %}

{% block content %}
<div class="contenedor-centrado">
    <div class="tarjeta-formulario">
        
        <h2>Modifica tu pregunta</h2>
        
        <form method="POST">
            {% csrf_token %}
            
            <div class="campo-formulario">
                {{ form.as_p }}
            </div>

            <hr style="margin: 20px 0; border: 0; border-top: 1px solid #ccc;">
            
            <h3>Opciones:</h3>
            <div id="contenedor-opciones">
                {% for opcion in opciones %}
                    <div class="campo-formulario fila-opcion" style="display: flex; align-items: center; gap: 10px; margin-bottom: 10px;">
                        
                        <input type="text" name="opcion_{{ opcion.id }}" value="{{ opcion.texto_opcion }}" class="form-control" required style="flex-grow: 1;">
                        
                        <button type="button" 
                           style="color: white; background-color: #dc3545; padding: 5px 10px; border: none; border-radius: 5px; cursor: pointer; font-size: 0.9em;"
                           onclick="eliminarFila(this)">
                           Borrar
                        </button>

                    </div>
                {% endfor %}
            </div>
            
            <div style="margin-top: 10px; margin-bottom: 20px;">
                <button type="button" onclick="agregarNuevaOpcion()" style="background-color: #28a745; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-size: 0.9em;">
                    + Añadir otra opción
                </button>
            </div>
            
            <button type="submit" class="btn-guardar" style="width: 100%; padding: 10px; font-size: 1.1em;">
                Guardar Todos los Cambios
            </button>
        </form>

    </div>
</div>

<script>
    // Función para desaparecer la opción de la pantalla
    function eliminarFila(boton) {
        if(confirm('¿Estás seguro de quitar esta opción? Se borrará al guardar los cambios.')) {
            // Encuentra el div padre (la fila completa) y lo elimina del HTML
            boton.closest('.fila-opcion').remove();
        }
    }

    // Función para inyectar un input nuevo
    function agregarNuevaOpcion() {
        const contenedor = document.getElementById('contenedor-opciones');
        const nuevaFila = document.createElement('div');
        nuevaFila.className = 'campo-formulario fila-opcion';
        nuevaFila.style = 'display: flex; align-items: center; gap: 10px; margin-bottom: 10px;';
        
        // Fíjate que el name de las nuevas es 'nuevas_opciones[]', justo como lo espera la vista en Python
        nuevaFila.innerHTML = `
            <input type="text" name="nuevas_opciones[]" placeholder="Escribe la nueva opción" class="form-control" required style="flex-grow: 1;">
            <button type="button" style="color: white; background-color: #dc3545; padding: 5px 10px; border: none; border-radius: 5px; cursor: pointer; font-size: 0.9em;" onclick="eliminarFila(this)">
                Quitar
            </button>
        `;
        
        contenedor.appendChild(nuevaFila);
    }
</script>
{% endblock %}
